<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Cloud — Evangelie Onbeskaamd</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  .bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* Word cloud container */
  .cloud-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    padding: 60px;
  }

  .cloud {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 12px 20px;
    max-width: 1200px;
    transition: opacity 1.5s ease;
  }

  .cloud-word {
    color: rgba(255,255,255,0.9);
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    animation: fadeInWord 0.6s ease-out;
    transition: font-size 0.4s ease;
  }

  @keyframes fadeInWord {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  /* CHRISTUS overlay */
  .christus-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;
  }

  .christus-overlay.active {
    opacity: 1;
  }

  .christus-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 140px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
    letter-spacing: 8px;
  }

  /* QR prompt shown before words start coming in */
  .qr-prompt {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: opacity 0.5s;
  }

  /* Admin controls - bottom right, subtle */
  .admin {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 20;
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  body:hover .admin { opacity: 1; }

  .admin button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-christus { background: #b8a832; color: #fff; }
  .btn-reset { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }

  /* Word count */
  .word-count {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 5;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
  }
</style>
</head>

  // =============================================

  var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const cloud = document.getElementById('cloud');
  const countEl = document.getElementById('word-count');
  const prompt = document.getElementById('qr-prompt');

  // Track word frequencies
  let wordCounts = {};
  let totalWords = 0;

  // Font sizes based on frequency
  function getFontSize(count) {
    if (count >= 10) return 72;
    if (count >= 7) return 60;
    if (count >= 5) return 48;
    if (count >= 3) return 36;
    if (count >= 2) return 28;
    return 20;
  }

  function renderCloud() {
    cloud.innerHTML = '';
    // Sort by count descending
    const sorted = Object.entries(wordCounts).sort((a, b) => b[1] - a[1]);

    sorted.forEach(([word, count]) => {
      const el = document.createElement('span');
      el.className = 'cloud-word';
      el.textContent = word;
      el.style.fontSize = getFontSize(count) + 'px';
      cloud.appendChild(el);
    });

    countEl.textContent = totalWords + ' woorde';

    if (totalWords > 0) {
      prompt.style.opacity = '0';
    }
  }

  function addWord(word) {
    const normalized = word.trim().toLowerCase();
    if (!normalized) return;
    wordCounts[normalized] = (wordCounts[normalized] || 0) + 1;
    totalWords++;
    renderCloud();
  }

  // Load existing words
  async function loadExisting() {
    const { data, error } = await client
      .from('words')
      .select('word')
      .order('created_at', { ascending: true });

    if (data) {
      data.forEach(row => addWord(row.word));
    }
  }

  // Subscribe to real-time inserts
  function subscribeToWords() {
    client
      .channel('words-channel')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'words' }, (payload) => {
        addWord(payload.new.word);
      })
      .subscribe();
  }

  // CHRISTUS transition
  function showChristus() {
    cloud.style.opacity = '0';
    setTimeout(() => {
      document.getElementById('christus-overlay').classList.add('active');
    }, 1500);
  }

  // Reset
  async function resetCloud() {
    if (!confirm('Reset alle woorde?')) return;
    await client.from('words').delete().neq('id', 0);
    wordCounts = {};
    totalWords = 0;
    cloud.style.opacity = '1';
    document.getElementById('christus-overlay').classList.remove('active');
    prompt.style.opacity = '1';
    renderCloud();
  }

  // Init
  loadExisting();
  subscribeToWords();
</script>
</body>
</html>
